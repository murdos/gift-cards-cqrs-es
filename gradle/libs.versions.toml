spring-boot-devtools = { name = "spring-boot-devtools", group = "org.springframework.boot" }
spring-boot-configuration-processor = { name = "spring-boot-configuration-processor", group = "org.springframework.boot" }
commons-lang3 = { name = "commons-lang3", group = "org.apache.commons" }
cucumber-java = { name = "cucumber-java", group = "io.cucumber", version.ref = "cucumber" }
